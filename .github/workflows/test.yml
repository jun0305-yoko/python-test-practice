name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v3

      - name: Pythonセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: テスト実行
        run: pytest
